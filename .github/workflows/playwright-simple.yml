name: Playwright Tests (Free Tier)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test
        continue-on-error: true

      - name: Test Summary
        if: always()
        run: |
          echo "## ✅ Test Execution Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Results:**" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/results.json ]; then
            echo "- Results file generated successfully" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Check 'Run tests' step for detailed output" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results (7 day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
