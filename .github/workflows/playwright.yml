name: Playwright Tests (Free Tier)

on:
  push:
    branches: [ master ]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (required for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci --no-audit && npm install --save-dev allure-commandline

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run tests with Allure reporter
        run: |
          mkdir -p allure-results
          npx playwright test
        continue-on-error: true

      # NOTE: moved cleanup to run AFTER uploads so reports are not deleted before being attached

      - name: Verify Playwright HTML Report
        if: always()
        run: |
          echo "📊 Verifying Playwright HTML report..."
          if [ -d "playwright-report" ] && [ -f "playwright-report/index.html" ]; then
            echo "✅ Playwright report generated successfully!"
            ls -lh playwright-report/index.html
          else
            echo "ℹ️ Playwright report will be available in artifacts"
          fi

      - name: Upload Playwright Report (Always - 3 days)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
          if-no-files-found: ignore
          compression-level: 9

      - name: Generate Allure Report
        if: always()
        run: |
          echo "📋 Generating Allure Report..."
          npx allure generate allure-results --clean -o allure-report
          
          if [ -f allure-report/index.html ]; then
            echo "✅ Allure report generated successfully!"
            ls -lh allure-report/index.html
          else
            echo "⚠️  No Allure report found"
          fi

      - name: Upload Allure Report (Always - 3 days)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 3
          if-no-files-found: ignore
          compression-level: 9

      - name: Test Execution Summary
        if: always()
        run: |
          echo "## 📊 Test Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Run Status:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Test Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 Run #: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 Branch: master" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated Reports:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 Playwright HTML Report" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Storage Optimization:**" >> $GITHUB_STEP_SUMMARY
          echo "- Reports uploaded for ALL runs (pass/fail)" >> $GITHUB_STEP_SUMMARY
          echo "- Large files removed; reports preserved" >> $GITHUB_STEP_SUMMARY
          echo "- Max retention: 3 days" >> $GITHUB_STEP_SUMMARY
          echo "- Compression: Maximum" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 Playwright Report: Artifacts → playwright-report" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Allure Report: Artifacts → allure-report" >> $GITHUB_STEP_SUMMARY
      
      - name: Cleanup large files after upload
        if: always()
        run: |
          echo "🧹 Post-upload cleanup of large artifacts..."
          find test-results -type f \( -name "*.webm" -o -name "*.mp4" -o -name "*.mov" \) -delete 2>/dev/null || true
          find test-results -type d -name "trace" -exec rm -rf {} + 2>/dev/null || true
          echo "✅ Post-upload cleanup complete"