name: Playwright Automation Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (required for Allure HTML)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit
          else
            npm install --no-audit
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify test data
        run: |
          ls -la Testdata || echo "⚠️ Testdata folder not found"

      - name: Run Playwright tests
        run: |
          mkdir -p allure-results
          cp environment.properties allure-results/ 2>/dev/null || true
          # Use playwright.config.js reporters (line + html + allure) so playwright-report/ is generated.
          npx playwright test

      - name: Verify Playwright HTML report exists
        if: always()
        run: |
          ls -la playwright-report || true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure HTML report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report
          ls -la allure-report || true

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  allure_report:
    name: Publish Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Playwright HTML report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: site/playwright-report

      - name: Download Allure HTML report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: site/allure-report

      - name: Create landing page
        run: |
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Test Reports</title>
              <style>
                body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:40px;line-height:1.5}
                .card{border:1px solid #ddd;border-radius:10px;padding:16px;max-width:760px}
                a{display:inline-block;margin:6px 0}
                code{background:#f6f8fa;padding:2px 6px;border-radius:6px}
              </style>
            </head>
            <body>
              <h1>Automation Test Reports</h1>
              <div class="card">
                <p>Choose a report:</p>
                <ul>
                  <li><a href="./playwright-report/index.html">Playwright HTML report</a></li>
                  <li><a href="./allure-report/index.html">Allure HTML report</a></li>
                </ul>
                <p>If a link 404s, confirm the workflow created <code>index.html</code> in that report folder.</p>
              </div>
            </body>
          </html>
          EOF
          touch site/.nojekyll

      # Preflight check: avoid running configure-pages when Pages is not enabled,
      # because that produces the confusing "Get Pages site failed" 404.
      - name: Check whether GitHub Pages is enabled
        id: pages_check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          http_code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "${api_url}")
          echo "pages_site_http_code=${http_code}" >> "$GITHUB_OUTPUT"
          echo "Pages site check returned HTTP ${http_code}"

      - name: Configure GitHub Pages
        id: configure_pages
        if: steps.pages_check.outputs.pages_site_http_code == '200'
        uses: actions/configure-pages@v5

      - name: GitHub Pages is not enabled (how to fix)
        if: steps.pages_check.outputs.pages_site_http_code != '200'
        shell: bash
        run: |
          echo "::warning::GitHub Pages is not enabled/configured for this repository (GET /repos/{owner}/{repo}/pages did not return 200)."
          echo "::warning::Fix (recommended): Repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions; then re-run this workflow."
          echo "Skipping Pages deployment; reports are still uploaded as workflow artifacts."
          exit 0

      - name: Upload Pages artifact
        if: steps.pages_check.outputs.pages_site_http_code == '200'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.pages_check.outputs.pages_site_http_code == '200'
        id: deployment
        uses: actions/deploy-pages@v4