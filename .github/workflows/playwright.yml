name: Playwright Automation Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    
    env:
      CI: true
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0
      DISPLAY: :99

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf $AGENT_TOOLSDIRECTORY
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          # Check if package-lock.json exists and is in sync
          if [ -f package-lock.json ]; then
            echo "package-lock.json found → attempting npm ci"
            if npm ci --prefer-offline --no-audit; then
              echo "✅ Dependencies installed successfully with npm ci"
            else
              echo "⚠️ npm ci failed, regenerating lock file..."
              rm package-lock.json
              npm install --no-audit
              echo "✅ Dependencies installed with npm install (lock file regenerated)"
            fi
          else
            echo "package-lock.json NOT found → running npm install"
            npm install --no-audit
          fi

      - name: Setup virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify test data (Excel)
        run: |
          echo "Working directory:"
          pwd
          echo "Project files:"
          ls -la
          echo "Checking Testdata folder:"
          ls -la Testdata || echo "Testdata folder not found (ensure it's committed to the repo)"

      - name: Run Playwright tests
        run: |
          export DISPLAY=:99
          export PLAYWRIGHT_HEADLESS=true
          # Create allure-results directory if it doesn't exist
          mkdir -p allure-results
          # Copy environment file to allure results
          cp environment.properties allure-results/ 2>/dev/null || true
          npx playwright test --reporter=line,allure-playwright

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

  allure_report:
    name: Generate & Deploy Allure Report
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Create reports navigation page
        if: always()
        run: |
          echo "=== Creating reports navigation page ==="
          
          # Ensure allure-history directory exists and is writable
          if [ -d "allure-history" ]; then
            echo "✅ allure-history directory found"
          else
            echo "❌ allure-history directory not found, creating it"
            mkdir -p allure-history
          fi
          
          # Create the reports navigation content directly
          cat > allure-history/reports.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playwright Test Reports</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 90%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 300;
        }
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px;
        }
        .report-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .report-card:hover {
            transform: translateY(-5px);
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 Playwright Test Reports</h1>
        </div>
        <div class="report-grid">
            <div class="report-card">
                <h3>📈 Allure Report</h3>
                <p>Comprehensive test execution report</p>
                <a href="./index.html" class="btn">View Allure Report</a>
            </div>
            <div class="report-card">
                <h3>📊 Repository</h3>
                <p>View source code and documentation</p>
                <a href="https://github.com/rameshqa197/playwright-automation" class="btn">GitHub Repository</a>
            </div>
        </div>
    </div>
</body>
</html>
EOF
          
          echo "✅ Reports navigation page created successfully"
          ls -la allure-history/ | grep -E "(reports\.html|index\.html)" || true

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          destination_dir: .
          keep_files: false
          force_orphan: true