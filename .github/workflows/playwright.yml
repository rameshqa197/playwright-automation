name: Playwright Tests

on:
  push:
    branches: [ master ]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Dependencies
        run: |
          npm ci
          npm install --save-dev allure-commandline

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # ✅ Clean only local workspace
      - name: Cleanup local artifacts
        run: |
          rm -rf allure-results allure-report test-results playwright-report || true

      - name: Run Playwright Tests
        run: npx playwright test
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      # ✅ Checkout gh-pages to retrieve previous history
      - name: Checkout gh-pages branch
        if: always()
        run: |
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages
          mkdir -p old-report
          cp -r * old-report/ || true
          git checkout -

      # ✅ Copy previous history into new report
      - name: Preserve Allure history
        if: always()
        run: |
          if [ -d "old-report/history" ]; then
            mkdir -p allure-report/history
            cp -r old-report/history/* allure-report/history/
          fi

      # ✅ Deploy updated report (WITHOUT force_orphan)
      - name: Deploy to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      - name: Add Report Link
        if: always()
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "## 📊 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 Allure Report: https://${OWNER}.github.io/${REPO}/" >> $GITHUB_STEP_SUMMARY