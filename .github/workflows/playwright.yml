name: Playwright Tests (Free Tier)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (required for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci --no-audit && npm install --save-dev allure-commandline

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run tests with Allure reporter
        run: |
          mkdir -p allure-results
          npx playwright test
        continue-on-error: true

      - name: Clean up large test files
        if: always()
        run: |
          echo "🧹 Cleaning up large test files..."
          find test-results -type f \( -name "*.webm" -o -name "*.mp4" -size +10M \) -delete 2>/dev/null || true
          find test-results -type d -name "trace" -exec rm -rf {} + 2>/dev/null || true
          echo "✅ Cleanup complete"

      - name: Delete old artifacts (storage cleanup)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🗑️  Deleting old artifacts to free storage..."
          gh api repos/${{ github.repository }}/actions/artifacts --paginate -q '.artifacts[] | select(.name=="playwright-report" or .name=="allure-report") | .id' | head -5 | xargs -I {} gh api repos/${{ github.repository }}/actions/artifacts/{} -X DELETE 2>/dev/null || true
          echo "✅ Old artifacts deleted"

      - name: Verify Playwright HTML Report
        if: always()
        run: |
          echo "📊 Verifying Playwright HTML report..."
          if [ -d "playwright-report" ] && [ -f "playwright-report/index.html" ]; then
            echo "✅ Playwright report generated successfully!"
            ls -lh playwright-report/index.html
          else
            echo "ℹ️ Playwright report will be available in artifacts"
          fi

      - name: Upload Playwright HTML Report (3 day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
          if-no-files-found: ignore
          compression-level: 9

      - name: Generate Allure Report
        if: always()
        run: |
          echo "📋 Generating Allure Report..."
          npx allure generate allure-results --clean -o allure-report
          
          if [ -f allure-report/index.html ]; then
            echo "✅ Allure report generated successfully!"
            ls -lh allure-report/index.html
          else
            echo "⚠️  No Allure report found"
          fi

      - name: Upload Allure Report (3 day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 3
          if-no-files-found: ignore
          compression-level: 9

      - name: Test Execution Summary
        if: always()
        run: |
          echo "## 📊 Test Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated Reports:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 Playwright HTML Report" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Storage Optimization:**" >> $GITHUB_STEP_SUMMARY
          echo "- Old artifacts auto-deleted" >> $GITHUB_STEP_SUMMARY
          echo "- Large files (videos) removed" >> $GITHUB_STEP_SUMMARY
          echo "- Max retention: 3 days" >> $GITHUB_STEP_SUMMARY
          echo "- Compression: Maximum" >> $GITHUB_STEP_SUMMARY
          echo "- Compression: Maximum" >> $GITHUB_STEP_SUMMARY