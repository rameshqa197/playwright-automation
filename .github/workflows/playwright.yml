name: Playwright Automation Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "Installing dependencies using npm ci"
            npm ci --no-audit
          else
            echo "package-lock.json not found, running npm install"
            npm install --no-audit
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify test data
        run: |
          echo "Checking Testdata directory"
          ls -la Testdata || echo "⚠️ Testdata folder not found"

      - name: Run Playwright tests
        run: |
          mkdir -p allure-results
          cp environment.properties allure-results/ 2>/dev/null || true
          npx playwright test --reporter=line,allure-playwright

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

  allure_report:
    name: Generate & Deploy Allure Report
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    
    # Set up for GitHub Pages Environment deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-history

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
