name: Playwright Tests (Free Tier)

on:
  push:
    branches: [ master ]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (required for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci --no-audit && npm install --save-dev allure-commandline

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run tests with Allure reporter
        run: |
          mkdir -p allure-results
          npx playwright test
        continue-on-error: true

      # NOTE: artifact deletion removed - deploying Allure to GitHub Pages instead

      - name: Verify Playwright HTML Report
        if: always()
        run: |
          echo "📊 Verifying Playwright HTML report..."
          if [ -d "playwright-report" ] && [ -f "playwright-report/index.html" ]; then
            echo "✅ Playwright report generated successfully!"
            ls -lh playwright-report/index.html
          else
            echo "ℹ️ Playwright report will be available in artifacts"
          fi

      # DISABLED: Artifact upload disabled due to storage quota limits
      # Reports are generated locally and accessible via build summary
      # - name: Upload Playwright Report (Always - 1 day)
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: playwright-report
      #     path: playwright-report/
      #     retention-days: 1
      #     if-no-files-found: ignore
      #     compression-level: 9

      - name: Generate Allure Report
        if: always()
        run: |
          echo "📋 Generating Allure Report..."
          npx allure generate allure-results --clean -o allure-report
          
          if [ -f allure-report/index.html ]; then
            echo "✅ Allure report generated successfully!"
            ls -lh allure-report/index.html
          else
            echo "⚠️  No Allure report found"
          fi

      # Publish Allure report to GitHub Pages for easy viewing
      - name: Upload Allure report to Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v1

      - name: Verify Pages deployment and add URL to summary
        if: always()
        run: |
          echo "🔎 Constructing GitHub Pages URL..."
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          PAGES_URL="https://${OWNER}.github.io/${REPO}/"
          echo "Pages URL: $PAGES_URL"
          echo "Waiting up to 60s for the Pages site to become available..."
          ok=0
          for i in {1..12}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$PAGES_URL" || echo "000")
            if [ "$status" = "200" ]; then
              ok=1
              echo "✅ Pages is live: $PAGES_URL"
              break
            fi
            echo "Attempt $i: status=$status - retrying in 5s..."
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "⚠️ Pages did not return 200 within timeout; it may still be deploying."
          fi
          echo "- 🔗 Allure report (Pages): $PAGES_URL" >> $GITHUB_STEP_SUMMARY
          echo "Allure Pages URL: $PAGES_URL"

      - name: Test Execution Summary
        if: always()
        run: |
          echo "## 📊 Test Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Run Status:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Test Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 Run #: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 Branch: master" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated Reports:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 Playwright HTML Report" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:**" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ Artifact uploads disabled (storage quota limit reached)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Reports generated locally (playwright-report/, allure-report/)" >> $GITHUB_STEP_SUMMARY
          echo "- 📥 To view reports: Clone repo and run 'npm run show-report'" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Local Report Paths:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 Playwright: ./playwright-report/index.html" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Allure: ./allure-report/index.html" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 Playwright Report: Artifacts → playwright-report" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Allure Report: Artifacts → allure-report" >> $GITHUB_STEP_SUMMARY
      
      - name: Cleanup large files after upload
        if: always()
        run: |
          echo "🧹 Post-upload cleanup of large artifacts..."
          find test-results -type f \( -name "*.webm" -o -name "*.mp4" -o -name "*.mov" \) -delete 2>/dev/null || true
          find test-results -type d -name "trace" -exec rm -rf {} + 2>/dev/null || true
          echo "✅ Post-upload cleanup complete"