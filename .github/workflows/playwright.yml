name: Playwright Automation Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    
    env:
      CI: true
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0
      DISPLAY: :99

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf $AGENT_TOOLSDIRECTORY
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          # Check if package-lock.json exists and is in sync
          if [ -f package-lock.json ]; then
            echo "package-lock.json found → attempting npm ci"
            if npm ci --prefer-offline --no-audit; then
              echo "✅ Dependencies installed successfully with npm ci"
            else
              echo "⚠️ npm ci failed, regenerating lock file..."
              rm package-lock.json
              npm install --no-audit
              echo "✅ Dependencies installed with npm install (lock file regenerated)"
            fi
          else
            echo "package-lock.json NOT found → running npm install"
            npm install --no-audit
          fi

      - name: Setup virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify test data (Excel)
        run: |
          echo "Working directory:"
          pwd
          echo "Project files:"
          ls -la
          echo "Checking Testdata folder:"
          ls -la Testdata || echo "Testdata folder not found (ensure it's committed to the repo)"

      - name: Run Playwright tests
        run: |
          export DISPLAY=:99
          export PLAYWRIGHT_HEADLESS=true
          # Copy environment file to allure results
          cp environment.properties allure-results/ 2>/dev/null || true
          npx playwright test --reporter=line,allure-playwright

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

  allure_report:
    name: Generate & Deploy Allure Report
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Debug directory structure
        if: always()
        run: |
          echo "=== Current directory contents ==="
          ls -la
          echo "=== Checking for reports-index.html ==="
          ls -la reports-index.html 2>/dev/null || echo "reports-index.html not found"
          echo "=== Checking allure-history directory ==="
          ls -la allure-history/ 2>/dev/null || echo "allure-history directory not found"

      - name: Copy reports index page
        if: always()
        run: |
          # Ensure allure-history directory exists and has proper permissions
          mkdir -p allure-history
          chmod 755 allure-history
          
          # Copy the reports index page
          cp reports-index.html allure-history/reports.html
          chmod 644 allure-history/reports.html
          
          # List directory contents for verification
          ls -la allure-history/

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          destination_dir: .
          keep_files: false
          force_orphan: true