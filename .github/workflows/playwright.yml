name: Playwright Tests with Allure

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '30 18 * * *'   # Nightly run ~12:00 AM IST
  workflow_dispatch:        # Allows manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Clean previous allure results
        run: rm -rf allure-results allure-report

      - name: Run Playwright tests with Allure reporter
        run: npx playwright test --reporter=line,allure-playwright
        continue-on-error: true
        env:
          CI: true

      - name: Check Allure Results
        if: always()
        run: |
          echo "Checking allure-results directory..."
          ls -la allure-results/ || echo "No allure-results folder found"
          echo "Number of result files:"
          find allure-results -name "*.json" | wc -l || echo "0"

      - name: Install Allure CLI
        if: always()
        run: |
          sudo wget https://github.com/allure-framework/allure2/releases/download/2.28.0/allure-2.28.0.tgz
          sudo tar -zxvf allure-2.28.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.28.0/bin/allure /usr/bin/allure
          allure --version

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "Generating Allure report..."
            allure generate allure-results -o allure-report --clean
            echo "Allure report generated successfully"
            ls -la allure-report/
          else
            echo "No allure results found to generate report"
            mkdir -p allure-report
            echo "<h1>No test results found</h1>" > allure-report/index.html
          fi

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report
          
