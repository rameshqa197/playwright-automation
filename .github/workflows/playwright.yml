name: Playwright Automation Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    
    env:
      CI: true
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0
      DISPLAY: :99

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          # Check if package-lock.json exists and is in sync
          if [ -f package-lock.json ]; then
            echo "package-lock.json found → attempting npm ci"
            if npm ci --prefer-offline --no-audit; then
              echo "✅ Dependencies installed successfully with npm ci"
            else
              echo "⚠️ npm ci failed, regenerating lock file..."
              rm package-lock.json
              npm install --no-audit
              echo "✅ Dependencies installed with npm install (lock file regenerated)"
            fi
          else
            echo "package-lock.json NOT found → running npm install"
            npm install --no-audit
          fi

      - name: Setup virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify test data (Excel)
        run: |
          echo "Working directory:"
          pwd
          echo "Project files:"
          ls -la
          echo "Checking Testdata folder:"
          ls -la Testdata || echo "Testdata folder not found (ensure it's committed to the repo)"

      - name: Run Playwright tests
        run: |
          export DISPLAY=:99
          export PLAYWRIGHT_HEADLESS=true
          npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

  allure_report:
    name: Generate & Deploy Allure Report
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master  # Consider pinning to a tag, e.g., @v1.x
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true