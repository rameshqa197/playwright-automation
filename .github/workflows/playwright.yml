name: Playwright Automation Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit
          else
            npm install --no-audit
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify test data
        run: |
          ls -la Testdata || echo "⚠️ Testdata folder not found"

      - name: Run Playwright tests
        run: |
          mkdir -p allure-results
          cp environment.properties allure-results/ 2>/dev/null || true
          # Use playwright.config.js reporters (line + html + allure) so playwright-report/ is generated.
          npx playwright test

      - name: Verify Playwright HTML report exists
        if: always()
        run: |
          ls -la playwright-report || true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

  allure_report:
    name: Generate & Deploy Allure Report
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Prepare Allure directories
        run: mkdir -p allure-history

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          enable_jekyll: false
          allow_empty_commit: true
          force_orphan: true