name: Playwright Automation Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (ci-safe)
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found → running npm ci"
            npm ci
          else
            echo "package-lock.json NOT found → running npm install"
            npm install
          fi
          npx playwright install --with-deps chromium  # Added --with-deps for CI reliability

      - name: Verify test data (Excel)
        run: |
          echo "Working directory:"
          pwd
          echo "Project files:"
          ls -la
          echo "Checking testdata folder:"
          ls -la testdata || echo "testdata folder not found (ensure it's committed to the repo)"

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

  allure_report:
    name: Generate & Deploy Allure Report
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master  # Consider pinning to a tag, e.g., @v1.x
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true